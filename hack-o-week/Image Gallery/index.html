<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumina Gallery</title>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Styles -->
    <link rel="stylesheet" href="style.css">
</head>
<body class="dark-mode">
    <!-- Glow Cursor -->
    <div class="cursor-glow" id="cursor-glow"></div>
    <div class="cursor-dot" id="cursor-dot"></div>

    <!-- Parallax Background -->
    <div class="bg-parallax" id="bg-parallax"></div>

    <!-- Navbar -->
    <header class="glass-nav">
        <div class="nav-container">
            <h1 class="logo">Lumina.</h1>
            <div class="search-bar">
                <i class="fa-solid fa-search"></i>
                <input type="text" id="search-input" placeholder="Search high-resolution images...">
            </div>
            <button class="icon-btn theme-toggle" id="theme-toggle" aria-label="Toggle Theme">
                <i class="fa-solid fa-sun" id="theme-icon"></i>
            </button>
        </div>
    </header>

    <!-- Filters -->
    <section class="filter-section">
        <ul class="filter-list" id="filter-list">
            <li class="filter-item active" data-filter="All">All</li>
            <li class="filter-item" data-filter="Nature">Nature</li>
            <li class="filter-item" data-filter="Travel">Travel</li>
            <li class="filter-item" data-filter="Food">Food</li>
            <li class="filter-item" data-filter="Aesthetic">Aesthetic</li>
        </ul>
    </section>

    <!-- Gallery Context -->
    <main class="gallery-container">
        <div class="masonry-grid" id="masonry-grid">
            <!-- Images generated by JS -->
        </div>
        
        <!-- Loading Spinner for Infinite Scroll -->
        <div class="loading-spinner" id="loading-spinner">
            <div class="spinner"></div>
            <span>Loading more...</span>
        </div>
    </main>

    <!-- Lightbox -->
    <div class="lightbox" id="lightbox">
        <button class="lightbox-close" id="lightbox-close"><i class="fa-solid fa-xmark"></i></button>
        
        <button class="lightbox-nav prev" id="lightbox-prev"><i class="fa-solid fa-chevron-left"></i></button>
        
        <div class="lightbox-content-wrapper">
            <img src="" alt="" class="lightbox-img" id="lightbox-img">
            
            <div class="lightbox-info">
                <div class="lightbox-text">
                    <h2 id="lightbox-title">Image Title</h2>
                    <span class="category-tag" id="lightbox-category">Category</span>
                </div>
                <div class="lightbox-actions">
                    <button class="action-btn like-btn" id="lightbox-like"><i class="fa-regular fa-heart"></i></button>
                    <button class="action-btn download-btn" id="lightbox-download"><i class="fa-solid fa-arrow-down"></i></button>
                </div>
            </div>
        </div>

        <button class="lightbox-nav next" id="lightbox-next"><i class="fa-solid fa-chevron-right"></i></button>
    </div>

    <!-- Toast Notifications -->
    <div id="toast-container" class="toast-container"></div>

    <script src="script.js"></script>
</body>
</html>
