<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ancient Library Catalogue</title>
    <meta name="description" content="A catalogue of ancient tomes and findings." />
    <!-- Clean typography -->
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;800&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- Simple Audio Setup -->
    <audio id="bg-audio" loop>
      <source src="https://assets.mixkit.co/music/preview/mixkit-spirit-in-the-woods-139.mp3" type="audio/mpeg">
    </audio>

    <!-- Top Navigation Bar -->
    <header class="top-nav">
       <div class="nav-title">Arcanum Library</div>
       <div class="nav-controls">
          <button id="audio-toggle" class="nav-btn" aria-label="Play/Pause Music">
             🎵 Play Music
          </button>
       </div>
    </header>

    <!-- Opening Screen -->
    <div id="intro-screen" class="screen-flex">
      <div class="closed-book" id="closed-book">
         <div class="cover-content">
            <h1>Arcanum</h1>
            <p>The Grand Catalogue</p>
            <button id="open-btn" class="primary-btn">Open the Tome</button>
         </div>
      </div>
    </div>

    <!-- Main Library Catalogue (Hidden initially) -->
    <div id="library-interface" class="hidden">
      
      <div class="book-layout">
        <!-- Left Page: Categories & Search -->
        <aside class="page page-left">
          <div class="page-inner scrollable">
             <h2 class="section-title">Directory</h2>
             
             <div class="search-container">
               <input type="text" id="search-input" placeholder="Search by title or author..." autocomplete="off"/>
             </div>

             <div class="categories-nav">
                <h3>Realms</h3>
                <ul id="categories-list">
                  <li class="category-item active" data-category="all">All Archives</li>
                  <li class="category-item" data-category="fiction">Fiction & Folklore</li>
                  <li class="category-item" data-category="science">Sciences</li>
                  <li class="category-item" data-category="history">History</li>
                  <li class="category-item" data-category="spells">Spells & Grimoires</li>
                </ul>
             </div>
          </div>
        </aside>

        <!-- Spine indicator for desktop -->
        <div class="book-spine-divider"></div>

        <!-- Right Page: Books Display -->
        <main class="page page-right">
          <div class="page-inner scrollable">
             <div class="right-header">
                <h2 class="section-title" id="current-category">All Archives</h2>
                <span class="count" id="book-count">0 items</span>
             </div>

             <div id="books-grid" class="books-grid">
               <!-- Book cards generated by JS -->
             </div>
          </div>
        </main>
      </div>

    </div>

    <!-- Book Detail Modal -->
    <div id="detail-modal" class="modal-overlay hidden">
      <div class="modal-content">
         <button id="close-modal" class="close-btn">&times;</button>
         <h3 id="modal-title">Book Title</h3>
         <p class="modal-author" id="modal-author">Author Name</p>
         <div class="modal-meta" id="modal-meta">
            <!-- Badges injected here -->
         </div>
         <hr>
         <p class="modal-desc" id="modal-desc">Book description goes here...</p>
      </div>
    </div>

    <script src="main.js"></script>
  </body>
</html>
